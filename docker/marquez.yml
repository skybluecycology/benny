# Marquez Configuration for v0.47.0+
# Note: migrateOnStartup was removed in 0.47.0 - migrations run automatically

server:
  applicationConnectors:
    - type: http
      port: 5000
  adminConnectors:
    - type: http
      port: 5001

db:
  driverClass: org.postgresql.Driver
  url: jdbc:postgresql://benny-marquez-db:5432/marquez
  user: marquez
  password: marquez

logging:
  level: INFO
  appenders:
    - type: console
      logFormat: "[%d{HH:mm:ss.SSS}] %-5level %logger{36} - %msg%n"
